    ssid: "Atoms3 Fallback Hotspot"
    password: "BukgLrtuPYXu"


# -------------------------
# Built-in RGB LED (WS2812)
# -------------------------
light:
  - platform: esp32_rmt_led_strip
    id: atom_led
    name: "AtomS3 LED"
    pin: GPIO35
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: RESTORE_DEFAULT_OFF

# -------------------------
# Built-in Button (GPIO41)
# -------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO41
      inverted: true
      mode: INPUT_PULLUP
    name: "AtomS3 Button"
    on_press:
      then:
        - homeassistant.service:
            service: light.toggle
            data:
              entity_id: light.obk59883442_light

  # -------------------------
  # Mirror HA light state on LED
  # -------------------------
  - platform: homeassistant
    id: cct_state
    entity_id: light.obk59883442_light
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: cct_state
            then:
              - light.turn_on:
                  id: atom_led
                  blue: 100%
            else:
              - light.turn_off: atom_led


