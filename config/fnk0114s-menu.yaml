lvgl:
  pages:
    - id: page1
      widgets:
        - label:
            text: "Page 1"

    - id: page2
      widgets:
        - label:
            text: "Page 2"

  top_layer:
    widgets:
      - buttonmatrix:
          align: bottom_mid
          width: 100%
          height: 40
          rows:
            - buttons:
                - text: "<"
                  on_press:
                    then:
                      lvgl.page.previous:

                - text: "Home"
                  on_press:
                    then:
                      lvgl.page.show: page1

                - text: ">"
                  on_press:
                    then:
                      lvgl.page.next:  
                        
  rotation: 90

