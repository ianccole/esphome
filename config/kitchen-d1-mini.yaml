esphome:
  name: kitchen-d1-mini

esp8266:
  board: d1_mini

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ijU/oxNagAUKlml+9eoY5pYfjJfpDiEg6P+PJeqHUlE="

ota:
  - platform: esphome
    password: "9807ecc1b22f0f011e4a76da3d573309"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: kitchen-d1-mini.local

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Kitchen-D1Mini Fallback Hotspot"
    password: "T2Dukrz2WFdI"

switch:
  - platform: gpio
    name: "blue led"
    inverted: yes
    pin: D4

captive_portal:
    
# I2C bus (default pins for D1 Mini)
i2c:
  sda: D2
  scl: D1
  scan: true

sensor:
  - platform: sht3xd
    address: 0x45
    heater_enabled: false
    temperature:
      name: "SHT30 Temperature"
      accuracy_decimals: 2
    humidity:
      name: "SHT30 Humidity"
      accuracy_decimals: 1
    update_interval: 30s
