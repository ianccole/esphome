substitutions:
  devicename: "fnk0114s"


esphome:
  name: ${devicename}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "ijU/oxNagAUKlml+9eoY5pYfjJfpDiEg6P+PJeqHUlE="

ota:
  - platform: esphome
    password: "9807ecc1b22f0f011e4a76da3d573309"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  #use_address: livingroom-esp32.local
  use_address: 192.168.1.146

  power_save_mode: none

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${devicename} Fallback Hotspot"
    password: "T2Dukrz2WFdI"

# ---------------- SPI (shared) ----------------
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

# ---------------- Backlight ----------------
output:
  - platform: ledc
    pin: GPIO27
    id: backlight_pwm

light:
  - platform: monochromatic
    name: "LCD Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON

# ---------------- Display ----------------
display:
  - platform: mipi_spi
    #platform: ili9xxx
    model: ST7796
    cs_pin: GPIO15
    dc_pin: GPIO2
    #reset_pin: GPIO4

    #invert_colors: true
    update_interval: never
    auto_clear_enabled: false

    #lambda: |-
    #  it.fill(Color::BLACK);
    #  it.printf(10, 10, id(main_font), "TEST");

# ---------------- Touch ----------------
touchscreen:
  - platform: xpt2046
    id: tft_touch 
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms

    calibration:
      x_min: 200
      x_max: 3800
      y_min: 200
      y_max: 3800

    transform:
      swap_xy: False
      mirror_x: False
      mirror_y: True

#time:
#  - platform: homeassistant
#    id: home_time
#    timezone: Europe/London # Adjust to your local timezone

time:
  - platform: sntp
    id: home_time
    timezone: Europe/London
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: clk_time
          text: !lambda |-
            return id(home_time).now().strftime("%H:%M");

      - lvgl.label.update:
          id: clk_date
          text: !lambda |-
            return id(home_time).now().strftime("%Y-%m-%d");
    
lvgl:
  pages:
    - id: canvas_9
      bg_color: 0x111827
      pad_all: 0
      widgets:
        - obj:
            id: clk_card
            x: 190
            y: 110
            width: 100
            height: 100
            bg_color: 0xFFFFFF
            bg_opa: 95%
            border_width: 1
            border_color: 0xCBD5E1
            border_opa: 20%
            radius: 16
            shadow_width: 0
            shadow_color: 0x64748B
            shadow_opa: 0%
            scrollbar_mode: "OFF"
            pad_all: 0
            widgets:
              - label:
                  id: clk_time
                  x: 6
                  y: 26
                  width: 88
                  height: 32
                  text: "Init..."
                  text_color: 0x1E293B
                  text_align: CENTER
                  long_mode: CLIP
                  text_font: montserrat_28
              - label:
                  id: clk_date
                  x: 6
                  y: 58
                  width: 88
                  height: 16
                  text: "Init..."
                  text_color: 0x64748B
                  text_align: CENTER
                  long_mode: CLIP
                  text_font: montserrat_12
  rotation: 90

interval:
  - interval: 1s
    then:

captive_portal:
    
